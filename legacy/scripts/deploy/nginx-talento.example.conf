# Ejemplo: reverse proxy TLS para talento.zodiplast.com.ec → app en :8080
# Ajustá rutas de certificados y upstream.

upstream talento_biometrico {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name talento.zodiplast.com.ec;

    ssl_certificate     /etc/ssl/certs/talento.zodiplast.com.ec.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/talento.zodiplast.com.ec.key;

    location / {
        proxy_pass         http://talento_biometrico;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name talento.zodiplast.com.ec;
    return 301 https://$host$request_uri;
}
